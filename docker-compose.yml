services:
  dispatcher:
    build:
      context: .
      # Build with host networking: the default docker bridge intermittently
      # times out reaching deb.debian.org (Fastly CDN), which breaks apt-get.
      network: host
    container_name: dispatcher
    network_mode: host
    # Run as the calling user's uid:gid (exported by scripts/dstart.sh) so files
    # written into the ~/.dispatcher bind mount are owned by you, not root.
    user: "${DISPATCHER_UID:-1000}:${DISPATCHER_GID:-1000}"
    environment:
      - BACKEND_PORT=8000
      - NGINX_PORT=8080
      # - API_URL=https://your-domain.com  # Override for external access
      # Database config (defaults to SQLite)
      - DB_TYPE=sqlite
      # For PostgreSQL:
      # - DB_TYPE=postgresql
      # - PG_HOST=postgres
      # - PG_PORT=5432
      # - PG_DB=dispatcher
      # - PG_USER=dispatcher
      # - PG_PWD=changeme
    volumes:
      - ${HOME}/.dispatcher:/opt/dispatcher
    restart: unless-stopped
    healthcheck:
      # Backend port is dynamic in portd mode; read it from the file the
      # entrypoint writes and hit a real endpoint.
      test: ["CMD-SHELL", "P=$$(cat /app/tmp/backend.port 2>/dev/null); [ -n \"$$P\" ] && curl -fsS http://127.0.0.1:$$P/openapi.json >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
